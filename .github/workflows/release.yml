name: release

# Tag-driven release pipeline for the ORBIT Rhino connector.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# fires three jobs:
#
#   build-windows : YAK (rh8-win) + Inno Setup .exe   on windows-latest
#   build-macos   : YAK (rh8-mac arm64+x64)            on macos-latest   (scaffold)
#   release       : creates the GitHub Release and attaches every artefact
#                   produced above

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Manual run: version string (without leading "v")'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write   # required for softprops/action-gh-release to create releases

jobs:
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.value }}
    env:
      # The csproj references Orbit.Objects / Orbit.Sdk from the private
      # github-orbit feed registered in nuget.config. NUGET_TOKEN is read by
      # nuget.config's <packageSourceCredentials> for that feed.
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version_override }}"
            if (-not $version) { $version = "0.0.0-dev" }
          } else {
            # ref_name is e.g. "v0.1.0" -- strip the leading v
            $version = $ref -replace '^v',''
          }
          Write-Host "Resolved version: $version"
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install YAK CLI
        shell: pwsh
        run: |
          $url  = 'https://files.mcneel.com/yak/tools/latest/yak.exe'
          $dest = "$env:RUNNER_TEMP\yak.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          Write-Host "Downloaded yak.exe to $dest"
          # Put it on PATH for the rest of the job.
          "$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Prepare NuGet sources for CI
        shell: pwsh
        # nuget.config registers a local-orbit-sdk source at ../SDK/nupkgs
        # which only exists in a sibling-clone dev layout. NuGet fails hard
        # (NU1301) if a listed source path is missing, so we materialise the
        # folder empty here. CI also doesn't need ORBIT_SDK_LOCAL: the csproj
        # falls back to PackageReference for Orbit.Objects / Orbit.Sdk from
        # the github-orbit feed (creds in nuget.config from $NUGET_TOKEN).
        run: |
          $sdkNupkgs = Join-Path (Split-Path -Parent $PWD) 'SDK\nupkgs'
          New-Item -ItemType Directory -Force -Path $sdkNupkgs | Out-Null
          Write-Host "Created empty $sdkNupkgs to satisfy nuget.config local source"

      - name: Restore + build YAK package
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.value }}"
          .\installers\rhino\build-yak.ps1 -Version $v -RhinoTargets rh8

      - name: Build Inno Setup .exe
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.value }}"

          # Locate ISCC -- pre-installed on windows-latest, fall back to choco.
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe still missing after choco install"
          }

          # The build-yak.ps1 step above already produced a release build.
          # Reuse its bin folder as the payload for Inno.
          $payload = (Resolve-Path "src\OrbitConnector.Rhino\bin\Release\net8.0-windows").Path
          Write-Host "Inno payload: $payload"
          Get-ChildItem $payload | Format-Table Name,Length

          $license = (Resolve-Path "LICENCE.txt").Path

          & $iscc `
            "/DPayloadDir=$payload" `
            "/DConnectorVersion=$v" `
            "/DLicenseFile=$license" `
            "/Q" `
            "installers\rhino\inno\OrbitConnector.Rhino.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }

          # ISCC's OutputDir=. is relative to the .iss; move it next to the
          # YAK artefacts so the upload step picks both up together.
          $exe = Get-ChildItem "installers\rhino\inno" -Filter "OrbitConnector-Rhino-Setup-v*.exe" | Select-Object -First 1
          if (-not $exe) { throw "Inno Setup did not produce an .exe in installers\rhino\inno" }
          Move-Item -Force $exe.FullName "installers\rhino\dist\"

          Write-Host "Windows artefacts:"
          Get-ChildItem installers\rhino\dist\* | Format-Table Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: orbit-connector-windows
          path: |
            installers/rhino/dist/orbit-connector-*-rh8-win.yak
            installers/rhino/dist/OrbitConnector-Rhino-Setup-v*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    # SCAFFOLD: the csproj is net8.0-windows today, so the build-mac.sh step
    # exits with a clear error and this job is allowed to fail without
    # blocking the release. See installers/rhino/MACOS.md.
    continue-on-error: true
    needs: build-windows
    env:
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install YAK CLI (Mac)
        run: |
          set -euo pipefail
          url='https://files.mcneel.com/yak/tools/latest/yak'
          dest="$RUNNER_TEMP/yak"
          curl -fsSL "$url" -o "$dest"
          chmod +x "$dest"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Prepare NuGet sources for CI
        # Same reason as the Windows job: nuget.config references ../SDK/nupkgs
        # which only exists in a sibling-clone dev layout.
        run: |
          set -euo pipefail
          sdk_nupkgs="$(dirname "$PWD")/SDK/nupkgs"
          mkdir -p "$sdk_nupkgs"
          echo "Created empty $sdk_nupkgs to satisfy nuget.config local source"

      - name: Build Mac YAK packages
        env:
          VERSION: ${{ needs.build-windows.outputs.version }}
        run: |
          chmod +x installers/rhino/build-mac.sh
          installers/rhino/build-mac.sh "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: orbit-connector-macos
          path: |
            installers/rhino/dist/orbit-connector-*-rh8-mac-*.yak
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos    # depends on it but build-macos may fail (continue-on-error)
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artefacts
        uses: actions/download-artifact@v4
        with:
          name: orbit-connector-windows
          path: release-assets

      - name: Download Mac artefacts (if any)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: orbit-connector-macos
          path: release-assets

      - name: List artefacts
        run: |
          ls -la release-assets || true

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          # Pull the section between this version's heading and the next
          # "## " heading. Falls back to the full changelog if no match.
          awk -v ver="$tag" '
            $0 ~ "^## " ver "( |$)" { found=1; print; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file" || true
          if [[ ! -s "$notes_file" ]]; then
            cat CHANGELOG.md > "$notes_file"
          fi
          echo "path=$notes_file" >> "$GITHUB_OUTPUT"
          echo "----- release notes -----"
          cat "$notes_file"
          echo "-------------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ORBIT Connectors ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            release-assets/orbit-connector-*-rh8-win.yak
            release-assets/OrbitConnector-Rhino-Setup-v*.exe
            release-assets/orbit-connector-*-rh8-mac-arm64.yak
            release-assets/orbit-connector-*-rh8-mac-x64.yak
