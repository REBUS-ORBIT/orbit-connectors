name: release

# Tag-driven release pipeline for the ORBIT connector suite.
#
#   git tag v0.1.1 && git push origin v0.1.1
#
# fires the following matrix of jobs (one per host x OS), then a single
# release job that downloads every artefact and publishes a GitHub
# Release named "ORBIT Connectors v<X.Y.Z>" with the body extracted from
# CHANGELOG.md:
#
#   build-rhino-windows         (yak + inno)        windows-latest
#   build-rhino-macos           (yak scaffold + dmg) macos-latest    continue-on-error
#   build-vectorworks-windows   (inno placeholder)  windows-latest   continue-on-error
#   build-vectorworks-macos     (dmg placeholder)   macos-latest     continue-on-error
#   build-ue5-windows           (inno placeholder)  windows-latest   continue-on-error
#   build-ue5-macos             (dmg placeholder)   macos-latest     continue-on-error
#   release                     (publish github release with all artefacts)
#
# Notes:
#   - Vectorworks + UE5 plug-in source does not exist yet (v0.1.1
#     scaffolds the release pipeline shape only). Their build jobs run
#     `continue-on-error: true` so the release still ships even if a
#     placeholder build glitches.
#   - The Rhino mac job is also continue-on-error because the csproj
#     remains net8.0-windows-only (see installers/rhino/MACOS.md). The
#     job will at least produce a .dmg wrapper around the
#     "use yak on Mac" README via hdiutil.
#   - orbit-sdk is now public; we clone it tokenlessly. The old
#     ORBIT_DEPLOY_PAT secret is no longer required (left provisioned
#     on the repo for safety, just unused).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Manual run: version string (without leading "v")'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write   # required for softprops/action-gh-release to create releases

jobs:
  # ---------------------------------------------------------------------------
  # Shared version resolver: every build job reads from this output instead of
  # re-parsing the tag, so a workflow_dispatch run with a manual version
  # produces consistent filenames across all 6 builds.
  resolve-version:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.v.outputs.value }}
    steps:
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ github.event.inputs.version_override }}"
            [[ -z "$v" ]] && v="0.0.0-dev"
          else
            # ref_name is e.g. "v0.1.1" -- strip the leading v
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "Resolved version: $v"
          echo "value=$v" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  build-rhino-windows:
    needs: resolve-version
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install YAK CLI
        shell: pwsh
        run: |
          $url  = 'https://files.mcneel.com/yak/tools/latest/yak.exe'
          $dest = "$env:RUNNER_TEMP\yak.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          Write-Host "Downloaded yak.exe to $dest"
          "$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Clone ORBIT SDK
        # orbit-sdk is now public, so a depth-1 tokenless clone works. The
        # csproj resolves Orbit.Objects / Orbit.Sdk via ProjectReference when
        # ORBIT_SDK_LOCAL=1 (see Directory.Build.props).
        shell: pwsh
        run: |
          $sdkParent = Split-Path -Parent $PWD
          $sdkDir    = Join-Path $sdkParent 'SDK'
          if (Test-Path $sdkDir) { Remove-Item -Recurse -Force $sdkDir }
          git clone --depth 1 https://github.com/REBUS-ORBIT/orbit-sdk.git $sdkDir
          # nuget.config also references ../SDK/nupkgs as a local source; create
          # it empty so NuGet doesn't fail with NU1301.
          New-Item -ItemType Directory -Force -Path (Join-Path $sdkDir 'nupkgs') | Out-Null
          Write-Host "Cloned orbit-sdk to $sdkDir"

      - name: Restore + build YAK package
        env:
          ORBIT_SDK_LOCAL: '1'
        shell: pwsh
        run: |
          .\installers\rhino\build-yak.ps1 -Version $env:VERSION -RhinoTargets rh8

      - name: Build Inno Setup .exe
        env:
          ORBIT_SDK_LOCAL: '1'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe still missing after choco install" }

          $payload = (Resolve-Path "src\OrbitConnector.Rhino\bin\Release\net8.0-windows").Path
          $license = (Resolve-Path "LICENCE.txt").Path
          $v       = $env:VERSION

          & $iscc `
            "/DPayloadDir=$payload" `
            "/DConnectorVersion=$v" `
            "/DLicenseFile=$license" `
            "/Q" `
            "installers\rhino\inno\OrbitConnector.Rhino.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }

          $exe = Get-ChildItem "installers\rhino\inno" -Filter "OrbitConnector-Rhino-Setup-v*.exe" | Select-Object -First 1
          if (-not $exe) { throw "Inno Setup did not produce an .exe in installers\rhino\inno" }
          Move-Item -Force $exe.FullName "installers\rhino\dist\"

          Write-Host "Windows artefacts:"
          Get-ChildItem installers\rhino\dist\* | Format-Table Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: rhino-windows
          path: |
            installers/rhino/dist/orbit-connector-*-rh8-win.yak
            installers/rhino/dist/OrbitConnector-Rhino-Setup-v*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-rhino-macos:
    needs: resolve-version
    runs-on: macos-latest
    timeout-minutes: 30
    # The csproj is net8.0-windows today, so the build-mac.sh step exits with
    # a clear error and this job is allowed to fail without blocking the
    # release. See installers/rhino/MACOS.md. The .dmg wrapper is still
    # produced regardless (it ships a "use YAK" README).
    continue-on-error: true
    env:
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install YAK CLI (Mac)
        run: |
          set -euo pipefail
          url='https://files.mcneel.com/yak/tools/latest/yak'
          dest="$RUNNER_TEMP/yak"
          if curl -fsSL "$url" -o "$dest" 2>/dev/null; then
            chmod +x "$dest"
            echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
            echo "Downloaded yak to $dest"
          else
            echo "WARNING: YAK download from $url returned a non-2xx status." >&2
            echo "build-mac.sh will fail later; build-dmg.sh will still run." >&2
          fi

      - name: Clone ORBIT SDK
        run: |
          set -euo pipefail
          sdk_dir="$(dirname "$PWD")/SDK"
          rm -rf "$sdk_dir"
          git clone --depth 1 https://github.com/REBUS-ORBIT/orbit-sdk.git "$sdk_dir"
          mkdir -p "$sdk_dir/nupkgs"
          echo "Cloned orbit-sdk to $sdk_dir"

      - name: Build Mac YAK packages (scaffold)
        # Allowed to fail (job-level continue-on-error catches it).
        continue-on-error: true
        env:
          ORBIT_SDK_LOCAL: '1'
        run: |
          chmod +x installers/rhino/build-mac.sh
          installers/rhino/build-mac.sh "$VERSION"

      - name: Build .dmg wrapper
        run: |
          chmod +x installers/rhino/build-dmg.sh
          installers/rhino/build-dmg.sh "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: rhino-macos
          path: |
            installers/rhino/dist/orbit-connector-*-rh8-mac-*.yak
            installers/rhino/dist/OrbitConnector-Rhino-Setup-v*.dmg
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  build-vectorworks-windows:
    needs: resolve-version
    runs-on: windows-latest
    timeout-minutes: 15
    # Scaffold placeholder build; allowed to fail without blocking release.
    continue-on-error: true
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Vectorworks placeholder .exe
        shell: pwsh
        run: |
          .\installers\vectorworks\build-windows.ps1 -Version $env:VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: vectorworks-windows
          path: installers/vectorworks/dist/OrbitConnector-Vectorworks-Setup-v*.exe
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  build-vectorworks-macos:
    needs: resolve-version
    runs-on: macos-latest
    timeout-minutes: 15
    # Scaffold placeholder build; allowed to fail without blocking release.
    continue-on-error: true
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Vectorworks placeholder .dmg
        run: |
          chmod +x installers/vectorworks/build-macos.sh
          installers/vectorworks/build-macos.sh "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: vectorworks-macos
          path: installers/vectorworks/dist/OrbitConnector-Vectorworks-Setup-v*.dmg
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  build-ue5-windows:
    needs: resolve-version
    runs-on: windows-latest
    timeout-minutes: 15
    # Scaffold placeholder build; allowed to fail without blocking release.
    continue-on-error: true
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build UE5 placeholder .exe
        shell: pwsh
        run: |
          .\installers\ue5\build-windows.ps1 -Version $env:VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: ue5-windows
          path: installers/ue5/dist/OrbitConnector-UE5-Setup-v*.exe
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  build-ue5-macos:
    needs: resolve-version
    runs-on: macos-latest
    timeout-minutes: 15
    # Scaffold placeholder build; allowed to fail without blocking release.
    continue-on-error: true
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build UE5 placeholder .dmg
        run: |
          chmod +x installers/ue5/build-macos.sh
          installers/ue5/build-macos.sh "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: ue5-macos
          path: installers/ue5/dist/OrbitConnector-UE5-Setup-v*.dmg
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build-rhino-windows
      - build-rhino-macos
      - build-vectorworks-windows
      - build-vectorworks-macos
      - build-ue5-windows
      - build-ue5-macos
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        # `download-artifact@v4` without a `name:` downloads every artefact
        # produced by upstream jobs into separate subfolders under `path:`.
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artefact tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets/_flat
          # Each artefact lands in release-assets/<artefact-name>/<file>; we
          # flatten so softprops/action-gh-release's `files:` globs see them
          # without having to enumerate every subfolder.
          find release-assets -type f \( -name "*.yak" -o -name "*.exe" -o -name "*.dmg" -o -name "*.pkg" \) -print0 |
            while IFS= read -r -d '' f; do
              cp -v "$f" release-assets/_flat/
            done
          echo "----- flat release assets -----"
          ls -la release-assets/_flat || true
          echo "-------------------------------"

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="$(mktemp)"
          # Match a heading of the form "## v0.1.1" or "## v0.1.1 — title".
          # Stop at the next "## v" heading.
          awk -v tag="$tag" '
            $0 ~ "^## " tag " " || $0 == "## " tag { found=1; next }
            found && /^## v/ { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file" || true
          if [[ ! -s "$notes_file" ]]; then
            cat CHANGELOG.md > "$notes_file"
          fi
          echo "path=$notes_file" >> "$GITHUB_OUTPUT"
          echo "----- release notes -----"
          cat "$notes_file"
          echo "-------------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # Human-readable release name: header reads "ORBIT Connectors v0.1.1"
          # rather than just the tag string.
          name: ORBIT Connectors ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            release-assets/_flat/orbit-connector-*-rh8-win.yak
            release-assets/_flat/orbit-connector-*-rh8-mac-*.yak
            release-assets/_flat/OrbitConnector-Rhino-Setup-v*.exe
            release-assets/_flat/OrbitConnector-Rhino-Setup-v*.dmg
            release-assets/_flat/OrbitConnector-Vectorworks-Setup-v*.exe
            release-assets/_flat/OrbitConnector-Vectorworks-Setup-v*.dmg
            release-assets/_flat/OrbitConnector-UE5-Setup-v*.exe
            release-assets/_flat/OrbitConnector-UE5-Setup-v*.dmg
